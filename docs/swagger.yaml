basePath: /api/v1
definitions:
  model.AuthResponse:
    properties:
      role:
        $ref: '#/definitions/model.UserRole'
      token:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  model.Bundle:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      deskripsi:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      mapel_id:
        type: integer
      nama_bundle:
        type: string
      public_id:
        type: string
      updated_at:
        type: string
      waktu_menit:
        type: integer
    type: object
  model.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  model.DashboardStats:
    properties:
      pending_payments:
        type: number
      this_month_revenue:
        type: number
      this_week_sessions:
        type: integer
      today_sessions:
        type: integer
      total_omzet:
        type: number
      total_students:
        type: integer
    type: object
  model.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  model.GradeRequest:
    properties:
      penilaian_manual:
        items:
          $ref: '#/definitions/model.PenilaianManual'
        type: array
    type: object
  model.HistoryResponse:
    properties:
      history_id:
        type: integer
      nama_bundle:
        type: string
      skor_akhir:
        type: number
      status:
        $ref: '#/definitions/model.StatusUjian'
      waktu_mulai:
        type: string
    type: object
  model.JenisSoal:
    enum:
    - pilihan_ganda
    - isian_singkat
    type: string
    x-enum-varnames:
    - SoalPG
    - SoalIsianSingkat
  model.Jenjang:
    properties:
      id:
        type: integer
      nama:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  model.Mapel:
    properties:
      id:
        type: integer
      jenjang_id:
        type: integer
      nama:
        type: string
    type: object
  model.PaymentStatus:
    enum:
    - pending
    - paid
    - overdue
    type: string
    x-enum-varnames:
    - PaymentPending
    - PaymentPaid
    - PaymentOverdue
  model.PenilaianManual:
    properties:
      skor_diberikan:
        type: number
      soal_id:
        type: integer
    type: object
  model.PilihanJawaban:
    properties:
      opsi:
        type: string
      teks:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  model.ReviewResponse:
    properties:
      id:
        type: integer
      is_benar:
        type: boolean
      jawaban_peserta:
        type: string
      kunci_jawaban:
        type: string
      pembahasan:
        type: string
      pilihan_jawaban:
        items:
          $ref: '#/definitions/model.PilihanJawaban'
        type: array
      teks_soal:
        type: string
      tipe_soal:
        $ref: '#/definitions/model.JenisSoal'
    type: object
  model.Session:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      notes:
        type: string
      payment_date:
        type: string
      payment_status:
        $ref: '#/definitions/model.PaymentStatus'
      price:
        type: number
      public_id:
        type: string
      status:
        $ref: '#/definitions/model.SessionStatus'
      student_id:
        type: integer
      student_name:
        description: Join result
        type: string
      subject:
        type: string
      time:
        type: string
      updated_at:
        type: string
    type: object
  model.SessionRequest:
    properties:
      date:
        description: 'Format: YYYY-MM-DD'
        type: string
      notes:
        type: string
      payment_date:
        description: 'Format: YYYY-MM-DD HH:MM:SS'
        type: string
      payment_status:
        $ref: '#/definitions/model.PaymentStatus'
      price:
        type: number
      status:
        $ref: '#/definitions/model.SessionStatus'
      student_id:
        type: integer
      subject:
        type: string
      time:
        description: 'Format: HH:MM'
        type: string
    required:
    - date
    - student_id
    - time
    type: object
  model.SessionStatus:
    enum:
    - scheduled
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - SessionScheduled
    - SessionCompleted
    - SessionCancelled
  model.SoalPublic:
    properties:
      bobot_nilai:
        type: integer
      id:
        type: integer
      pilihan_jawaban:
        items:
          $ref: '#/definitions/model.PilihanJawaban'
        type: array
      teks_soal:
        type: string
      tipe_soal:
        $ref: '#/definitions/model.JenisSoal'
    type: object
  model.StatusUjian:
    enum:
    - berlangsung
    - menunggu_koreksi
    - selesai
    type: string
    x-enum-varnames:
    - StatusBerlangsung
    - StatusMenungguKoreksi
    - StatusSelesai
  model.Student:
    properties:
      address:
        type: string
      contact:
        type: string
      created_at:
        type: string
      grade:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      public_id:
        type: string
      school:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  model.StudentDocument:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      document_kind:
        $ref: '#/definitions/model.StudentDocumentKind'
      document_number:
        type: string
      id:
        type: integer
      linked_invoice_id:
        type: integer
      linked_invoice_number:
        type: string
      message:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      public_id:
        type: string
      session_count:
        type: integer
      sessions:
        items:
          $ref: '#/definitions/model.StudentDocumentSession'
        type: array
      student_id:
        type: integer
      student_name:
        type: string
      summary:
        type: string
      total_amount:
        type: number
      updated_at:
        type: string
    type: object
  model.StudentDocumentKind:
    enum:
    - invoice
    - report
    type: string
    x-enum-varnames:
    - StudentDocumentInvoice
    - StudentDocumentReport
  model.StudentDocumentRequest:
    properties:
      linked_invoice_id:
        type: integer
      message:
        type: string
      session_ids:
        items:
          type: integer
        type: array
      student_id:
        type: integer
      summary:
        type: string
    required:
    - session_ids
    - student_id
    type: object
  model.StudentDocumentSession:
    properties:
      created_at:
        type: string
      document_id:
        type: integer
      id:
        type: integer
      note:
        type: string
      payment_status:
        type: string
      price:
        type: number
      session_date:
        type: string
      session_id:
        type: integer
      session_time:
        type: string
      subject:
        type: string
    type: object
  model.StudentRequest:
    properties:
      address:
        type: string
      contact:
        type: string
      grade:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      school:
        type: string
      user_id:
        type: integer
    required:
    - name
    type: object
  model.SubmitJawaban:
    properties:
      jawaban_peserta:
        type: string
      soal_id:
        type: integer
    type: object
  model.SubmitRequest:
    properties:
      jawaban:
        items:
          $ref: '#/definitions/model.SubmitJawaban'
        type: array
    type: object
  model.UserRole:
    enum:
    - admin
    - peserta
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RolePeserta
  model.WebResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: Backend API for CerdasIND Examination System
  title: CerdasIND API
  version: "1.0"
paths:
  /admin/bundles:
    get:
      description: Retrieve all exam bundles including inactive ones
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Bundle'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all bundles (Admin)
      tags:
      - admin
  /admin/bundles/{id}/export:
    get:
      description: Download all questions in a bundle as .xlsx file
      parameters:
      - description: Bundle ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: OK
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export soal to Excel
      tags:
      - admin
  /admin/bundles/{id}/update:
    put:
      consumes:
      - multipart/form-data
      description: Update existing questions or add new ones via .xlsx upload
      parameters:
      - description: Bundle ID
        in: path
        name: id
        required: true
        type: integer
      - description: Excel File
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update soal via Excel
      tags:
      - admin
  /admin/bundles/upload:
    post:
      consumes:
      - multipart/form-data
      description: Create a new bundle and bulk insert questions from .xlsx file
      parameters:
      - description: Excel File
        in: formData
        name: file
        required: true
        type: file
      - description: Mapel ID
        in: formData
        name: mapel_id
        required: true
        type: integer
      - description: Bundle Name
        in: formData
        name: nama_bundle
        required: true
        type: string
      - description: Time in Minutes
        in: formData
        name: waktu_menit
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload bundle and soal from Excel
      tags:
      - admin
  /admin/dashboard/stats:
    get:
      description: Calculates key performance indicators (KPIs) for the dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DashboardStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard stats (Admin)
      tags:
      - admin
  /admin/invoices:
    get:
      description: Retrieve all invoice documents, with optional filters
      parameters:
      - description: Student ID
        in: query
        name: studentId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.StudentDocument'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all invoices (Admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Generate and save a new invoice document for a student session
      parameters:
      - description: Invoice Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.StudentDocumentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.WebResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.StudentDocument'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create invoice (Admin)
      tags:
      - admin
  /admin/invoices/{id}:
    get:
      description: Retrieve a specific invoice document by its unique ID
      parameters:
      - description: Invoice ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StudentDocument'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get invoice by ID (Admin)
      tags:
      - admin
  /admin/reports:
    get:
      description: Retrieve all report documents, with optional filters
      parameters:
      - description: Student ID
        in: query
        name: studentId
        type: integer
      - description: Linked Invoice ID
        in: query
        name: linkedInvoiceId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.StudentDocument'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all reports (Admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Generate and save a new report document for a student session
      parameters:
      - description: Report Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.StudentDocumentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.WebResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.StudentDocument'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create report (Admin)
      tags:
      - admin
  /admin/reports/{id}:
    get:
      description: Retrieve a specific report document by its unique ID
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StudentDocument'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get report by ID (Admin)
      tags:
      - admin
  /admin/sessions:
    get:
      description: Retrieve sessions with support for various filters
      parameters:
      - description: Student ID
        in: query
        name: studentId
        type: integer
      - description: Start Date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: End Date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      - description: Session Status (scheduled, completed, cancelled)
        in: query
        name: status
        type: string
      - description: Payment Status (pending, paid, overdue)
        in: query
        name: paymentStatus
        type: string
      - description: Search by student name or contact
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Session'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all sessions (Admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Record a new tutoring session
      parameters:
      - description: Session Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create session (Admin)
      tags:
      - admin
  /admin/sessions/{id}:
    delete:
      description: Remove a session record
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete session (Admin)
      tags:
      - admin
    get:
      description: Retrieve a specific session including the associated student details
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Session'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get session by ID (Admin)
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Update session details. Handles logic for payment_date
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: integer
      - description: Session Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.SessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update session (Admin)
      tags:
      - admin
  /admin/students:
    get:
      description: Retrieve all students from the database, ordered by name
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Student'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all students (Admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Add a new student record
      parameters:
      - description: Student Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.StudentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create student (Admin)
      tags:
      - admin
  /admin/students/{id}:
    delete:
      description: Remove a student and their associated sessions
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete student (Admin)
      tags:
      - admin
    get:
      description: Retrieve a specific student by their unique ID
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Student'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get student by ID (Admin)
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Modify an existing student's information
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: integer
      - description: Student Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.StudentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WebResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update student (Admin)
      tags:
      - admin
  /admin/submissions:
    get:
      description: Retrieve list of student exam submissions, filtered by status
      parameters:
      - description: Status (menunggu_koreksi, selesai)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user submissions
      tags:
      - admin
  /admin/submissions/{history_id}:
    get:
      description: Retrieve detailed answers of a student submission for grading
      parameters:
      - description: History ID
        in: path
        name: history_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get submission detail
      tags:
      - admin
  /admin/submissions/{history_id}/grade:
    put:
      consumes:
      - application/json
